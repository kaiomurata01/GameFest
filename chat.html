<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamerFest Bot 🤖</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card-bg: #111111;
            --neon-cyan: #33D9FF;
            --neon-purple: #a855f7;
            --text: #ffffff;
            --text-dim: #aaaaaa;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at top right, #1a0a2a, var(--bg));
        }

        /* Botão para voltar ao site principal */
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--text);
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            border: 1px solid var(--neon-purple);
            padding: 8px 15px;
            border-radius: 5px;
            transition: 0.3s;
        }
        .back-link:hover {
            background: var(--neon-purple);
            box-shadow: 0 0 10px var(--neon-purple);
        }

        #chat-container {
            width: 90%;
            max-width: 450px;
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
            border: 2px solid var(--neon-purple);
            display: flex;
            flex-direction: column;
            height: 80vh;
            max-height: 700px;
            overflow: hidden;
        }

        #chat-header {
            background: linear-gradient(90deg, var(--neon-purple), #6e20b3);
            padding: 15px 20px;
            font-size: 1.2rem;
            font-weight: 900;
            text-align: center;
            border-bottom: 2px solid var(--neon-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bot-message { background-color: #222; align-self: flex-start; border-left: 3px solid var(--neon-cyan); }
        .user-message { background-color: var(--neon-purple); align-self: flex-end; }

        #chat-input-area { display: flex; padding: 15px; background-color: #1a1a1a; border-top: 1px solid #333; }
        #user-input { flex: 1; padding: 12px; background: var(--bg); border: 1px solid #444; color: white; border-radius: 5px; outline: none; }
        #send-btn { background: var(--neon-cyan); border: none; padding: 0 15px; margin-left: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #444; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← Voltar ao Site</a>

    <div id="chat-container">
        <div id="chat-header">GAMERFEST BOT</div>
        <div id="chat-messages">
            <div class="message bot-message">Saudações, player! 👾 Pergunte-me sobre ingressos, datas, cronograma ou campeonatos!</div>
        </div>
        <div id="chat-input-area">
            <input type="text" id="user-input" placeholder="Digite sua dúvida..." autocomplete="off">
            <button id="send-btn" onclick="sendMessage()">ENVIAR</button>
        </div>
    </div>

    <script>
        const regrasDeNegocio = [
            { palavrasChave: ["ingresso", "comprar", "valor", "preco"], resposta: "Unidade Diária: R$ 80 | Passaporte 4 dias: R$ 250. <a href='ingressos.html' style='color:var(--neon-cyan)'>Compre aqui!</a>" },
            { palavrasChave: ["onde", "local", "data", "quando"], resposta: "📍 30/10 a 02/11 na GAMERFEST ARENA, São Paulo - SP." },
            { palavrasChave: ["ola", "oi"], resposta: "Fala, lenda! O que quer saber sobre o GAMERFEST?" }
        ];

        function sendMessage() {
            const input = document.getElementById('user-input');
            if (!input.value.trim()) return;
            addMsg(input.value, 'user-message');
            const userText = input.value.toLowerCase();
            input.value = '';
            setTimeout(() => {
                let r = "Não entendi. Tente perguntar sobre 'ingressos' ou 'datas'!";
                for(let reg of regrasDeNegocio) {
                    if(reg.palavrasChave.some(p => userText.includes(p))) r = reg.resposta;
                }
                addMsg(r, 'bot-message');
            }, 600);
        }

        function addMsg(t, c) {
            const m = document.getElementById('chat-messages');
            const d = document.createElement('div');
            d.className = 'message ' + c;
            d.innerHTML = t;
            m.appendChild(d);
            m.scrollTop = m.scrollHeight;
        }

        document.getElementById("user-input").addEventListener("keypress", (e) => { if(e.key === "Enter") sendMessage(); });
    </script>
</body>
</html>
